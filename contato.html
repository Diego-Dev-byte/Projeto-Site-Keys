    <main>
        <section>

            <h2>Fale Conosco</h2>

            <p style="margin-bottom:20px;">
                Tem alguma dúvida, problema ou precisa de suporte? Envie uma mensagem para nossa equipe!
            </p>

            <form>

                <div class="grupo-input">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" required>
                </div>

                <div class="grupo-input">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required>
                </div>

                <div class="grupo-input">
                    <label for="assunto">Assunto</label>
                    <select id="assunto">
                        <option>Dúvida</option>
                        <option>Problema com compra</option>
                        <option>Suporte técnico</option>
                    </select>
                </div>

                <div class="grupo-input">
                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" rows="5" required></textarea>
                </div>

                <button type="submit" class="btn-comprar">Enviar Mensagem</button>

            </form>

        </section>
    </main>
